<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — 32B WIKI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .wiki-header { border-bottom: 2px solid #00d4ff; padding-bottom: 10px; margin-bottom: 30px; color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .infobox { 
            background: #161b22; border: 1px solid #30363d; border-radius: 10px; 
            padding: 20px; position: sticky; top: 20px;
        }
        .infobox h3 { color: #00d4ff; font-size: 1.5rem; margin-bottom: 15px; border-bottom: 1px solid #30363d; }
        .infobox table { width: 100%; font-size: 0.9rem; }
        .infobox td { color: #8b949e; padding: 5px 0; }
        .infobox td:first-child { font-weight: bold; color: #c9d1d9; width: 40%; }
        .content-section { line-height: 1.8; font-size: 1.1rem; }
        .content-section h2 { color: #00d4ff; margin-top: 30px; border-left: 4px solid #00d1ff; padding-left: 15px; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-btn { margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
<div class="container mt-5">
    <a href="../index.html" class="back-btn btn btn-outline-info btn-sm">← На главную</a>
    
    <div class="row">
        <!-- Основной контент -->
        <div class="col-lg-8">
            <h1 class="wiki-header">{{ title }}</h1>
            <div class="content-section">
                {{ content }}
            </div>
        </div>

        <!-- Инфобокс -->
        <div class="col-lg-4">
            <div class="infobox">
                <h3>{{ title }}</h3>
                <table>
                    <tr><td>📍 Локация</td><td>{{ location }}</td></tr>
                    <tr><td>🗣 Язык</td><td>{{ languages }}</td></tr>
                    <tr><td>🏛 Столица</td><td>{{ capital }}</td></tr>
                    <tr><td>💰 Валюта</td><td>{{ currency }}</td></tr>
                    <tr><td>🛡 Статус</td><td>{{ status }}</td></tr>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
