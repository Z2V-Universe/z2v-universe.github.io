<!DOCTYPE html>
<html langru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z2V Universe Wiki</title>
    <!-- Подключаем библиотеки для парсинга -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
    :root {
        --bg-color: #05070a; /* Глубокий космос */
        --card-bg: rgba(255, 255, 255, 0.05); /* Полупрозрачное стекло */
        --accent-gold: #d4af37; /* Золото из твоего скина */
        --accent-green: #00ff88; /* Неоновый зеленый (глаза/визор) */
        --text-main: #e0e0e0;
        --text-dim: #888;
        --border-glow: rgba(0, 255, 136, 0.3);
    }

    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background: var(--bg-color);
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
        color: var(--text-main); 
        margin: 0; 
        padding: 40px 20px;
        min-height: 100vh;
    }

    .container { 
        max-width: 900px; 
        margin: 0 auto; 
    }

    h1 { 
        text-transform: uppercase;
        letter-spacing: 4px;
        font-size: 2.5em;
        color: #fff; 
        text-shadow: 0 0 15px var(--accent-green);
        border-bottom: 1px solid var(--accent-gold);
        padding-bottom: 15px;
        margin-bottom: 40px;
    }

    /* Карточки статей в стиле "Интерфейс Лунного Иона" */
    .article-card { 
        background: var(--card-bg);
        backdrop-filter: blur(10px); /* Эффект матового стекла */
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 25px; 
        margin-bottom: 20px; 
        border-radius: 15px; 
        cursor: pointer; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
    }

    .article-card:hover { 
        transform: scale(1.02) translateY(-5px);
        border-color: var(--accent-green);
        box-shadow: 0 0 20px var(--border-glow);
        background: rgba(0, 255, 136, 0.08);
    }

    .article-card h2 { 
        margin: 0; 
        font-size: 1.5em; 
        color: var(--accent-gold); 
        text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
    }

    .tags { 
        margin-top: 10px;
        font-size: 0.85em; 
        color: var(--text-dim);
        font-family: monospace;
    }

    /* Просмотр статьи */
    #content-view { 
        background: rgba(20, 25, 30, 0.8);
        backdrop-filter: blur(15px);
        padding: 40px; 
        border-radius: 20px; 
        border: 1px solid var(--accent-gold);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .back-btn { 
        background: transparent; 
        color: var(--accent-green); 
        border: 1px solid var(--accent-green); 
        padding: 8px 20px; 
        cursor: pointer; 
        border-radius: 5px; 
        margin-bottom: 30px;
        font-family: monospace;
        text-transform: uppercase;
        transition: 0.3s;
    }

    .back-btn:hover { 
        background: var(--accent-green); 
        color: #000;
        box-shadow: 0 0 15px var(--accent-green);
    }

    .article-text {
        font-size: 1.1em;
        line-height: 1.8;
        color: #ccc;
    }

    .article-text h2, .article-text h3 { color: var(--accent-gold); }
    .article-text p { margin-bottom: 20px; }

    .metadata-badge { 
        display: inline-block; 
        background: rgba(212, 175, 55, 0.2); 
        color: var(--accent-gold);
        padding: 4px 12px; 
        border-radius: 20px; 
        font-size: 0.8em; 
        margin-right: 8px;
        border: 1px solid var(--accent-gold);
    }

    /* Стилизация скроллбара */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #05070a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

</style>
</head>
<body>

<div class="container">
    <div id="main-view">
        <h1>Z2V Universe Articles</h1>
        <div id="articles-list">Загрузка вселенной...</div>
    </div>

    <div id="content-view">
        <button class="back-btn" onclick="showList()">← Назад к списку</button>
        <div id="article-body"></div>
    </div>
</div>

<script>
    // НАСТРОЙКИ (Замени на свои данные)
    const REPO_OWNER = 'Z2V-Universe';
    const REPO_NAME = 'z2v-universe.github.io';
    const FOLDER_PATH = 'articles';

    const listElement = document.getElementById('articles-list');
    const mainView = document.getElementById('main-view');
    const contentView = document.getElementById('content-view');
    const articleBody = document.getElementById('article-body');

    // 1. Функция получения списка файлов через GitHub API
    async function fetchArticles() {
        const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER_PATH}`;
        
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new_error('Не удалось загрузить список файлов');
            
            const files = await response.json();
            listElement.innerHTML = ''; // Очистка

            // Фильтруем только .md файлы
            const mdFiles = files.filter(file => file.name.endsWith('.md'));

            if (mdFiles.length === 0) {
                listElement.innerHTML = 'Статьи пока не найдены.';
                return;
            }

            mdFiles.forEach(file => {
                const card = document.createElement('div');
                card.className = 'article-string';
                card.innerHTML = `
                    <div class="article-card" onclick="loadArticle('${file.download_url}')">
                        <h2>${file.name.replace('.md', '')}</h2>
                        <div class="tags">Нажми, чтобы прочитать</div>
                    </div>
                `;
                listElement.appendChild(card);
            });
        } catch (err) {
            listElement.innerHTML = 'Ошибка: ' + err.message;
        }
    }

    // 2. Функция загрузки и рендеринга содержимого файла
    async function loadArticle(url) {
        try {
            const response = await fetch(url);
            const rawText = await response.text();

            // Разделяем метаданные (YAML) и контент (Markdown)
            const parts = rawText.split('---');
            let yamlContent = '';
            let markdownContent = '';

            if (parts.length >= 3) {
                // Если есть блок --- между метаданными и контентом
                yamlContent = parts[1];
                markdownContent = parts.slice(2).join('---');
            } else {
                markdownContent = rawText;
            }

            // Парсим YAML
            const metadata = jsyaml.load(yamlContent);

            // Формируем HTML
            let html = '';
            if (metadata && metadata.name) {
                html += `<h1>${metadata.name}</h1>`;
                if (metadata.role) html += `<span class="metadata-badge">${metadata.role}</span>`;
                if (metadata.location) html += `<p><i>${metadata.location}</i></p>`;
            }
            
            html += `<div class="article-text">${marked.parse(markdownContent)}</div>`;

            articleBody.innerHTML = html;
            
            // Переключаем виды
            mainView.style.display = 'none';
            contentView.style.display = 'block';

        } catch (err) {
            alert('Ошибка при чтении статьи: ' + err.message);
        }
    }

    function showList() {
        mainView.style.display = 'block';
        contentView.style.display = 'none';
    }

    // Запуск при загрузке страницы
    fetchArticles();
</script>

</body>
</html>
