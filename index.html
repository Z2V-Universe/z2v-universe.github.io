<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z2V Universe Wiki</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Библиотеки для парсинга -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>

    <div id="app">
        <header>
            <h1>Z2V Universe Wiki</h1>
            <nav id="main-nav">
                <a href="#/">Главная</a>
                <!-- Сюда JavaScript будет динамически добавлять ссылки на статьи -->
                <div id="dynamic-links" style="display: inline;"></div>
            </nav>
        </header>

        <main id="content-area">
            <div id="article-view">
                <h1>Добро пожаловать в Z2V</h1>
                <p>Выберите статью в меню выше, чтобы начать исследование вселенной.</p>
            </div>
        </main>
    </div>

    <script>
        // ПУТЬ К ТВОЕМУ РЕПОЗИТОРИЮ (Замени на свой, если нужно)
        const REPO_OWNER = 'Z2V-Universe'; 
        const REPO_NAME = 'z2v-universe.github.io';
        const FOLDER_PATH = 'articles';

        const contentArea = document.getElementById('article-view');
        const dynamicLinksContainer = document.getElementById('dynamic-links');

        // 1. Функция загрузки списка всех статей для меню
         async function loadNavigation() {
            const listFile = 'articles_list.json';
            
            try {
                const response = await fetch(listFile);
                if (!response.ok) throw new Error('Список статей не найден. Запусти factory.py');
                
                const slugs = await response.json(); // Это просто массив строк: ["nikanda"]

                dynamicLinksContainer.innerHTML = ''; 

                slugs.forEach(slug => {
                    const link = document.createElement('a');
                    link.href = `#${slug}`;
                    link.innerText = ` | ${slug.replace('_', ' ')}`;
                    link.style.marginLeft = "10px";
                    dynamicLinksContainer.appendChild(link);
                });
            } catch (err) {
                console.error("Ошибка навигации:", err);
                dynamicLinksContainer.innerHTML = '<span style="color:red">Ошибка загрузки меню</span>';
            }
        }

        // 2. Функция загрузки и рендеринга конкретной статьи
        async function loadArticle() {
            const hash = window.location.hash.replace('#', '');

            if (!hash || hash === '/') {
                contentArea.innerHTML = '<h1>Главная</h1><p>Выберите статью в меню.</p>';
                return;
            }

            try {
                // Пытаемся загрузить файл из папки articles
                const response = await fetch(`articles/${hash}.md`);
                if (!response.ok) throw new Error('Статья не найдена');

                const mdText = await response.text();
                
                // Парсим YAML (метаданные) и Markdown
                const parts = mdText.split('---');
                let yamlContent = '';
                let markdownContent = '';

                if (parts.length >= 3) {
                    yamlContent = parts[1];
                    markdownContent = parts.slice(2).join('---');
                } else {
                    markdownContent = mdText;
                }

                const metadata = jsyaml.load(yamlContent);

                // Формируем красивый HTML
                let html = '';
                if (metadata) {
                    if (metadata.role) html += `<span class="metadata-string">${metadata.role.toUpperCase()}</span>`;
                    if (metadata.name) html += `<h1>${metadata.name}</h1>`;
                    if (metadata.location) html += `<p class="location">📍 ${metadata.location}</p>`;
                    if (metadata.tags) {
                        const tagsHtml = metadata.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('');
                        html += `<div class="tags">${tagsHtml}</div>`;
                    }
                }
                
                html += `<hr><div class="article-body">${marked.parse(markdownContent)}</div>`;
                contentArea.innerHTML = html;

            } catch (error) {
                contentArea.innerHTML = `<h1>Ошибка</h1><p>${error.message}</p>`;
            }
        }

        // Слушатели событий
        window.addEventListener('hashchange', loadArticle);
        window.addEventListener('load', () => {
            loadNavigation(); // Сначала грузим меню
            loadArticle();   // Потом грузим статью (если есть хэш)
        });
    </script>
</body>
</html>
