<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z2V Universe Wiki</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Библиотеки для парсинга -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>

    <div id="app">
        <header>
            <h1>Z2V Universe Wiki</h1>
            <nav id="main-nav">
                <!-- Сюда будут подгружаться ссылки на статьи -->
                <a href="#/">Главная</a>
            </lang>
        </header>

        <main id="content-area">
            <!-- Сюда будет рендериться контент статьи -->
            <div id="article-view">
                <p>Выберите статью из списка или введите адрес в URL.</p>
            </div>
        </main>
    </div>

    <script>
        // Функция для загрузки статьи
        async function loadArticle() {
            const contentArea = document.getElementById('article-view');
            const hash = window.location.hash.replace('#', '');

            // Если мы на главной (пустой хэш)
            if (!hash || hash === '/') {
                contentArea.innerHTML = '<h1>Добро пожа пожаловать в Z2V</h1><p>Выберите статью в меню.</p>';
                return;
            }

            try {
                // Пытаемся загрузить .md файл из папки articles
                const response = await fetch(`articles/${hash}.md`);
                
                if (!response.ok) {
                    throw new Error('Статья не найдена');
                }

                const mdText = await response.text();
                
                // Парсим YAML и Markdown
                const parts = mdText.split('---');
                const yamlContent = parts[1];
                const markdownContent = parts.slice(2).join('---');

                const metadata = jsyaml.load(yamlContent);
                
                // Рендерим заголовок и контент
                contentArea.innerHTML = `
                    <div class="metadata-badge">${metadata.role.toUpperCase()}</div>
                    <h1>${metadata.name}</h1>
                    <p class="location">📍 ${metadata.location}</p>
                    <div class="tags">${metadata.tags ? metadata.tags.split(',').map(t => `<span>${t.trim()}</span>`).join('') : ''}</div>
                    <hr>
                    <div class="article-body">${marked.parse(markdownContent)}</div>
                `;

            } catch (error) {
                contentArea.innerHTML = `<h1>Ошибка</h1><p>${error.message}</p>`;
            }
        }

        // Слушаем изменение хэша (переход по ссылкам)
        window.addEventListener('hashchange', loadArticle);
        
        // Запускаем при первой загрузке страницы
        window.addEventListener('load', loadArticle);
    </script>
</body>
</html>
